# Root mise config for the logseq-encode-garden.
# Tasks are file tasks under mise-tasks/ (see [[My/Pref/Dev/mise/Tasks]]); this
# file mainly anchors MISE_PROJECT_ROOT and pins the tools those tasks rely on.

[tools]
# node backs the npm-installed rulesync below.
node = "lts"
# rulesync compiles this garden's AI configs (the skills) for each supported tool.
# The ask-my-agent-anything-about-me task uses it to generate a tool's config on
# demand. No AI agent is pinned — bring your own (Claude Code, Codex, Cursor, or
# GitHub Copilot); the task asks which one you have, then launches it.
"npm:rulesync" = "latest"
# readwise gives agents the `readwise` command to search and read the graph owner's
# Readwise + Reader library (see [[readwise-cli]]). Its workflow skills are vendored
# under .rulesync/skills/ (readwise-cli, triage, quiz, …) and compiled by rulesync.
# Auth is per-user: `readwise login` (or `login-with-token` for headless agents).
"npm:@readwise/cli" = "latest"

[env]
# mise's npm backend (aube) refuses packages under its lowDownloadThreshold
# (1000 weekly downloads) to catch typosquats. @readwise/cli is the vendor's own,
# legitimately low-traffic package, so exempt just it — this keeps the gate (and the
# OSV malicious-package check) active for everything else. See [[readwise-cli]].
AUBE_ALLOWED_UNPOPULAR_PACKAGES = "@readwise/cli"
