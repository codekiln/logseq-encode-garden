# Root mise config for the logseq-encode-garden.
# Tasks are file tasks under mise-tasks/ (see [[My/Pref/Dev/mise/Tasks]]); this
# file mainly anchors MISE_PROJECT_ROOT and pins the tools those tasks rely on.

[tools]
# node backs the npm-installed rulesync below.
node = "lts"
# rulesync compiles this garden's AI configs (the skills) for each supported tool.
# The ask-my-agent-anything-about-me task uses it to generate a tool's config on
# demand. No AI agent is pinned — bring your own (Claude Code, Codex, Cursor, or
# GitHub Copilot); the task asks which one you have, then launches it.
"npm:rulesync" = "latest"
