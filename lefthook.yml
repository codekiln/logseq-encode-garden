# Block commits that contain personal/employer identifiers before they can be
# committed to this (public) graph. Uses the global mise `secrets:scan` task,
# which sources its patterns from a private graph + the machine username.
pre-commit:
  commands:
    identity-guard:
      run: mise run secrets:scan {staged_files}
    # Normalize invisible paste-artifact characters (nbsp, narrow nbsp,
    # zero-width space, BOM) in staged files, then re-stage the fixes so the
    # commit records clean text. See mise-tasks/text/fix-invisible.
    normalize-whitespace:
      run: mise run text:fix-invisible {staged_files}
      stage_fixed: true
